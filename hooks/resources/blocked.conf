# blocked.commands — patterns that hard-block a Bash command
#
# Format:  PATTERN  @@  reason shown to Claude
#
# PATTERN is a Python regex (re.search) applied to:
#   1. The full raw command string
#   2. Each individual tree-sitter command node
# Use ^ to anchor patterns to the start of a command node only.
# Lines starting with # and blank lines are ignored.

# ── Destructive file operations ───────────────────────────────────────────────
# rm in any command position — tree-sitter node check catches nested usage
(?:^|[;&|\s])\s*rm\b  @@  rm not permitted — use: mv <path> ~/.Trash/
\bfind\b.*(-delete|-exec\s+rm\b)  @@  find -delete / -exec rm is destructive — list files first

# ── Redirects to protected system paths ──────────────────────────────────────
>+\s*/(bin|etc|usr|lib|sbin|var|home|root|System|Library)  @@  redirect to protected system path not permitted

# ── Privilege escalation ──────────────────────────────────────────────────────
\bsudo\b|\bdoas\b  @@  privilege escalation (sudo/doas) not permitted

# ── Disk and filesystem modification ─────────────────────────────────────────
\b(mkfs|fdisk|parted)\b  @@  disk/filesystem modification not permitted
\bdd\b.*\bof=  @@  dd with output file not permitted
\bdiskutil\s+erase\b  @@  diskutil erase not permitted

# ── Remote code execution ─────────────────────────────────────────────────────
(curl|wget|fetch)\s.*\|\s*(bash|sh|zsh|source)\b  @@  piping remote content to shell not permitted
(curl|wget)\s.*(-d\s*@|-F\s.*=@|--data-binary\s*@|--upload-file)  @@  uploading local files via curl/wget — ask user first

# ── System directory modification ─────────────────────────────────────────────
(mv|cp|ln|chmod|chown)\s.+\s/(etc|usr|bin|System|Library)  @@  modification of system directories not permitted

# ── Sensitive file protection ─────────────────────────────────────────────────
[12]?>>?\s*\S*\.env\b  @@  overwriting .env files — use Edit tool instead

# ── Git safety ────────────────────────────────────────────────────────────────
\bgit\b.*\bpush\b.*(-f\b|--force\b|--force-with-lease\b)  @@  force push not permitted — use regular push
\bgit\b.*(checkout\s+\.\s*$|restore\s+\.\s*$|clean\s+-[a-zA-Z]*f)  @@  destructive git op (checkout ., restore ., clean -f) — specify files explicitly
\bgit\s+add\s+(-A\b|\.(\s|$))  @@  broad git staging (git add . / -A) — stage specific files

# ── Process and power management ─────────────────────────────────────────────
\bkill\s+-9\s+1\b  @@  killing PID 1 not permitted
\b(killall|shutdown|reboot|halt)\b  @@  system process/power management not permitted

# ── Python package management (use uv instead) ────────────────────────────────
# ^ anchoring ensures uv run python3 -m ... is not affected (starts with uv, not python)
^python3?\s+-m\b  @@  use uv run python3 -m instead of bare python/python3 -m
^python3?\s+pip\b  @@  use uv pip instead of python/python3 pip
^python\.exe\s  @@  python.exe not permitted — use python3 or uv
^gpip3?\b  @@  global pip not permitted — use uv pip
^gpython\b  @@  global python not permitted — use python3 or uv
