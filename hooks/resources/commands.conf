[-] python -m ** #Use: uv run python -m <module> to run with the managed environment
[-] python3 -m ** #Use: uv run python -m <module> to run with the managed environment
[-] python pip ** #Use: uv pip <command> for package management
[-] python3 pip ** #Use: uv pip <command> for package management
[-] python.exe ** #Use: uv run python to run with the managed environment
[-] gpip #Use: uv pip for package management; uv venv to manage environments
[-] gpip ** #Use: uv pip for package management; uv venv to manage environments
[-] gpip3 #Use: uv pip for package management; uv venv to manage environments
[-] gpip3 ** #Use: uv pip for package management; uv venv to manage environments
[-] gpython #Use: uv venv to create or manage Python environments
[-] gpython ** #Use: uv venv to create or manage Python environments

# ── Pipe-to-shell ─────────────────────────────────────────────────────────────
# NOTE: these rules run on the RAW whitespace-split command (before tree-sitter
# extraction) so they catch compound expressions.  A hardcoded check in the
# guard additionally catches "| <shell>" with trailing args (e.g. bash -s)
# which the single-** constraint cannot express as a single rule.
[-] ** | bash
[-] ** | bash *
[-] ** | sh
[-] ** | sh *
[-] ** | zsh
[-] ** | zsh *
[-] ** | fish
[-] ** | fish *
[-] ** | dash
[-] ** | dash *
[-] ** | source *

