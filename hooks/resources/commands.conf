# ── 4.1  Denied — destructive / history-rewriting ops ───────────────────────────
[?] git ** push ** -f ** #Rewrites remote history — require explicit approval
[?] git ** push ** --force ** #Rewrites remote history — require explicit approval
[?] git ** push ** --force-with-lease ** #Still rewrites remote history — require explicit approval
[-] git ** checkout . #Use: git restore <file> or git stash to discard specific changes
[-] git ** restore . #Use: git restore <file> to restore specific files only
[-] git ** clean ** -f* ** #Use: git stash or mv <file> ~/.Trash/ to preserve work
[-] git ** add ** -a ** #Use: git add <specific-files> to stage intentionally
[-] git ** add . #Use: git add <specific-files> to avoid staging secrets or binaries
[-] git ** reset ** --hard ** #Use: git revert to undo commits without rewriting history

# ── 4.2  Branch protections — protected branches require PRs ────────────────────
# The &[-] Git directive powers the runtime branch guard, which denies:
#   - push (implicit/explicit/refspec) to any listed branch
#   - merge/rebase/cherry-pick/reset while ON any listed branch
#   - gh pr merge targeting any listed branch
# The explicit deny rules below are defense-in-depth for the token-level evaluator.
&[-] Git(main,master,develop,development,prod,production,qa,dev,release,release*) #Protected branch: open a PR instead

[-] git ** push ** origin {main,master,develop,development,prod,production,qa,dev,release} #Protected branch: open a PR instead
[-] git ** push ** origin release* #Protected branch: open a PR instead
[-] git ** push ** origin --delete {main,master,develop,development,prod,production,qa,dev,release} #Cannot delete a protected branch
[-] git ** push ** origin --delete release* #Cannot delete a protected release branch
[-] git ** branch ** -D {main,master,develop,development,prod,production,qa,dev,release} #Cannot delete protected branch locally
[-] git ** branch ** -D release* #Cannot delete protected release branch locally

# ── 4.3  Ask — history-affecting local mutations ───────────────────────────────
[~] git ** reset ** #Resetting index/HEAD — confirm intent and scope
[+] git ** push ** #Approved: pushing to non-protected branches
[+] git ** pull ** #Approved: pull preserves revertable history
[+] git ** merge ** #Approved: merge preserves revertable history
[~] git ** rebase ** #Confirm: rebasing rewrites commit history
[~] git ** cherry-pick ** #Confirm: cherry-pick creates new history on the current branch
[~] git ** clone ** #Confirm: cloning pulls external code locally

