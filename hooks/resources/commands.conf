# ── Sensitive file protection ─────────────────────────────────────────────────
[-] ** > *.env
[-] ** >> *.env
[~] ** > *commands.conf #Writing to commands.conf changes hook policy — confirm this is intentional
[~] ** >> *commands.conf #Appending to commands.conf changes hook policy — confirm this is intentional

# ── Git safety ────────────────────────────────────────────────────────────────
# Force push — flag at start of arg list
[-] git push -f #Use: open a PR instead of force-pushing
[-] git push -f ** #Use: open a PR instead of force-pushing
[-] git push --force #Use: open a PR instead of force-pushing
[-] git push --force ** #Use: open a PR instead of force-pushing
[-] git push --force-with-lease #Use: open a PR instead of force-pushing
[-] git push --force-with-lease ** #Use: open a PR instead of force-pushing
# Force push — flag at end of arg list
[-] git push ** -f #Use: open a PR instead of force-pushing
[-] git push ** --force #Use: open a PR instead of force-pushing
[-] git push ** --force-with-lease #Use: open a PR instead of force-pushing

# Destructive checkout / restore / clean
[-] git checkout . #Use: git restore <file> or git stash to discard specific changes
[-] git restore . #Use: git restore <file> to restore specific files only
[-] git clean -f* #Use: git stash or mv <file> ~/.Trash/ to preserve work
[-] git clean -f* ** #Use: git stash or mv <file> ~/.Trash/ to preserve work
[-] git clean ** -f* #Use: git stash or mv <file> ~/.Trash/ to preserve work

# Broad staging
[-] git add -a #Use: git add <specific-files> to stage intentionally
[-] git add -a ** #Use: git add <specific-files> to stage intentionally
[-] git add . #Use: git add <specific-files> to avoid staging secrets or binaries

# Destructive reset — hard rewrite (deny); soft/mixed (ask)
[-] git reset --hard #Use: git revert to undo commits without rewriting history
[-] git reset --hard ** #Use: git revert to undo commits without rewriting history
[~] git reset #Resetting index/HEAD — confirm intent and scope
[~] git reset **

# Remote mutations — push, pull, merge, rebase
[~] git push #Confirm: pushing changes to remote
[~] git push **
[~] git pull #Confirm: pulling may overwrite local work
[~] git pull **
[~] git merge #Confirm: merging into current branch
[~] git merge **
[~] git rebase #Confirm: rebasing rewrites commit history
[~] git rebase **

