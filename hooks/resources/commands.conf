# commands.conf — Claude Code command permission policy
#
# FORMAT
#   [+] <pattern>   allow Bash command
#   [-] <pattern>   deny Bash command
#   [~] <pattern>   ask (PreToolUse) / deny (PermissionRequest fallback)
#  $[+] <ToolName> [path-pattern]  allow Claude Code tool
#  $[-] <ToolName> [path-pattern]  deny Claude Code tool
#  $[~] <ToolName> [path-pattern]  ask for Claude Code tool
#
#   path-pattern is optional. When present it is matched against the tool's
#   primary target (file_path for Read/Edit/Write, url for WebFetch,
#   pattern for Glob/Grep). Omitting it matches any target.
#   $VAR and ${VAR} in path-patterns are expanded from the environment at
#   load time (e.g. $HOME expands to the user's home directory).
#
#   One space required between prefix and pattern.
#   Full-line comments start with #. Blank lines ignored.
#   Inline hint: <rule> #<hint>  — everything after the first ' #' is the reason.
#   Hint text is stripped of leading/trailing whitespace.
#   [-] hints: shown to Claude as the deny reason.
#   [~] hints: shown to user in the Bash confirmation prompt (PermissionRequest).
#   [+] hints: shown to user when the tool runs (allow notification).
#   $[~] hints: logged only — not shown in the Edit/Write permission dialog.
#
# WILDCARDS  (both Bash and tool path-patterns, all matching case-insensitive)
#   ?              Exactly one character
#   *              Any characters, crosses / and \ (within a single value)
#   **             One or more whitespace-separated arguments (Bash rules only)
#
# EVALUATION  (Bash rules)
#   Pass 1 — raw: tokenize full command on whitespace; apply deny/ask rules.
#             A hardcoded pipe-to-shell check also runs here (catches | <shell>
#             with any trailing args, which one-**-per-rule cannot express).
#   Pass 2 — per-command: tree-sitter extracts individual commands from
#             compound expressions; each is evaluated independently.
#             Deny/ask on any sub-command governs the whole compound.
#   No match anywhere → DEFER (falls through to settings.json)
#   Highest literal_count specificity wins; tie-break: deny > ask > allow
#
# EVALUATION  (Tool rules)
#   1. Match tool_name case-insensitively against rule's first token
#   2. If rule has a path-pattern, match it against the tool's primary target
#   3. First match in file order wins (specificity: longer literal prefix wins)
#
# RULE IDS
#   rule_{line_number} (1-based line number in this file)

# ── Destructive file operations ───────────────────────────────────────────────
# rm: tree-sitter extracts sub-commands, so nested rm is caught by these rules.
# git rm is allowed below in the git section.
[-] rm #Use: mv <file> ~/.Trash/
[-] rm ** #Use: mv <file> ~/.Trash/
[-] find ** -delete #Use: mv <files> ~/.Trash/ instead of find -delete

# Note: find -exec rm is caught via tree-sitter extracting rm as a separate command.
# Note: curl/wget piped to bash cannot be expressed as per-command glob rules —
#       the pipe is a shell construct that tree-sitter splits into two commands.
#       Rely on blocked patterns in settings.json for pipe-to-shell detection.

# ── Redirects to protected system paths ──────────────────────────────────────
[-] ** > /bin*
[-] ** > /etc*
[-] ** > /usr*
[-] ** > /lib*
[-] ** > /sbin*
[-] ** > /var*
[-] ** > /home*
[-] ** > /root*
[-] ** > /system*
[-] ** > /library*
[-] ** >> /bin*
[-] ** >> /etc*
[-] ** >> /usr*
[-] ** >> /lib*
[-] ** >> /sbin*
[-] ** >> /var*
[-] ** >> /home*
[-] ** >> /root*
[-] ** >> /system*
[-] ** >> /library*

# ── Privilege escalation ──────────────────────────────────────────────────────
[-] sudo #Use: uv run / npx / task for project commands instead of sudo
[-] sudo ** #Use: uv run / npx / task for project commands instead of sudo
[-] doas #Use: uv run / npx / task for project commands instead of doas
[-] doas ** #Use: uv run / npx / task for project commands instead of doas

# ── Disk and filesystem modification ─────────────────────────────────────────
[-] mkfs #Filesystem formatting is not permitted
[-] mkfs ** #Filesystem formatting is not permitted
[-] fdisk #Disk partitioning is not permitted
[-] fdisk ** #Disk partitioning is not permitted
[-] parted #Disk partitioning is not permitted
[-] parted ** #Disk partitioning is not permitted
[-] dd ** of=* #Destructive disk write with dd is not permitted
[-] diskutil erase #Disk erasure is not permitted
[-] diskutil erase ** #Disk erasure is not permitted

# ── Network ───────────────────────────────────────────────────────────────────
# curl: read-only fetches allowed; sending data requires confirmation
[~] curl ** -d * #Sending data in request — confirm
[~] curl ** --data* #Sending data in request — confirm
[~] curl ** -F * #Uploading form data — confirm
# wget: allowed but confirm (writes data to disk)
[~] wget #Confirm: wget writes files to disk
[~] wget ** #Confirm: wget writes files to disk

