# ── 1.1  Destructive file operations ────────────────────────────────────────────
# tree-sitter extracts sub-commands, so nested rm is caught by these rules.
# find -exec rm is also caught via tree-sitter extracting rm as a separate command.
# git rm is allowed separately in the Git section.
[+] rm /tmp/* ** #Approved: removing temp files in /tmp
[-] rm ** #Use: mv <file> ~/.Trash/
[-] find ** -delete ** #Use: mv <files> ~/.Trash/ instead of find -delete

# ── 1.2  Privilege escalation ───────────────────────────────────────────────────
[-] sudo ** #Use: uv run / npx / task for project commands instead of sudo
[-] doas ** #Use: uv run / npx / task for project commands instead of doas

# ── 1.3  Disk and filesystem formatting ─────────────────────────────────────────
[-] mkfs ** #Filesystem formatting is not permitted
[-] fdisk ** #Disk partitioning is not permitted
[-] parted ** #Disk partitioning is not permitted
[-] dd ** of=* #Destructive disk write with dd is not permitted
[-] diskutil ** erase ** #Disk erasure is not permitted

# ── 1.4  Pipe-to-shell ─────────────────────────────────────────────────────────
# These rules run on the RAW whitespace-split command (before tree-sitter
# extraction) so they catch compound expressions.  A hardcoded check in the
# guard additionally catches "| <shell>" with trailing args (e.g. bash -s)
# which the single-** constraint cannot express as a single rule.
[-] ** | bash
[-] ** | bash *
[-] ** | sh
[-] ** | sh *
[-] ** | zsh
[-] ** | zsh *
[-] ** | fish
[-] ** | fish *
[-] ** | dash
[-] ** | dash *
[-] ** | source *

# ── 1.5  Path traversal ────────────────────────────────────────────────────────
[-] ** .. ** #Path traversal is not allowed use cd and direct path access

# ── 1.6  Process and power management ──────────────────────────────────────────
[-] kill -9 1 #Killing PID 1 (init) is not permitted
[-] killall ** #Use: kill <pid> to target a specific process
[-] shutdown ** #System power management commands are not permitted
[-] reboot ** #System power management commands are not permitted
[-] halt ** #System power management commands are not permitted
[-] nohup ** #Disallowed: creates unmanaged persistent processes run task in background mode instead
[~] taskkill ** #Killing processes — confirm target and scope

