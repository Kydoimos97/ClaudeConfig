$[-] Write *.exe #Binary: cannot create or overwrite executables
$[-] Write *.so #Binary: cannot create or overwrite shared objects
$[-] Write *.dylib #Binary: cannot create or overwrite dynamic libraries
$[-] Write *.sh #Scripts outside home: denied
$[-] Write *.bash #Scripts outside home: denied
$[-] Write *.cmd #Scripts outside home: denied
$[-] Write *.bat #Scripts outside home: denied
$[-] Write *.ps1 #Scripts outside home: denied

